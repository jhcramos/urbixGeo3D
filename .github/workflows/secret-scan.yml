name: Secret scan

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block committed API keys and tokens
        shell: python
        run: |
          import os, re, sys
          patterns = [
            ('GitHub PAT', re.compile(r'\bgh[pousr]_[A-Za-z0-9_]{30,}\b')),
            ('Anthropic API key', re.compile(r'\bsk-ant-[A-Za-z0-9_-]{20,}\b')),
            ('OpenAI API key', re.compile(r'\bsk-(?:proj-)?[A-Za-z0-9_-]{24,}\b')),
            ('Google/Gemini API key', re.compile(r'\bAIza[0-9A-Za-z_-]{35}\b')),
            ('AWS access key', re.compile(r'\b(?:AKIA|ASIA)[0-9A-Z]{16}\b')),
            ('Stripe secret/restricted key', re.compile(r'\b(?:sk|rk)_(?:live|test)_[0-9A-Za-z]{20,}\b')),
            ('Shopify token', re.compile(r'\bshp(?:at|ca|ss|ua)_[A-Za-z0-9]{30,}\b')),
            ('Telegram bot token', re.compile(r'\b\d{8,12}:[A-Za-z0-9_-]{30,}\b')),
            ('Slack token', re.compile(r'\bxox[baprs]-[A-Za-z0-9-]{20,}\b')),
            ('NPM token', re.compile(r'\bnpm_[A-Za-z0-9]{30,}\b')),
            ('Resend API key', re.compile(r'\bre_[A-Za-z0-9_]{20,}\b')),
          ]
          skip_dirs = {'.git', 'node_modules', 'dist', 'build', '.next', 'coverage', 'vendor', 'Pods'}
          skip_ext = {'.png','.jpg','.jpeg','.gif','.webp','.pdf','.zip','.gz','.mp4','.mov','.apk','.ico','.ttf','.otf'}
          findings = []
          for root, dirs, files in os.walk('.'):
            dirs[:] = [d for d in dirs if d not in skip_dirs]
            for fn in files:
              path = os.path.join(root, fn)
              if any(path.endswith(ext) for ext in skip_ext):
                continue
              try:
                text = open(path, encoding='utf-8', errors='ignore').read()
              except Exception:
                continue
              for i, line in enumerate(text.splitlines(), 1):
                if 'REMOVED' in line or 'placeholder' in line.lower():
                  continue
                for name, rx in patterns:
                  if rx.search(line):
                    findings.append(f'{name}: {path}:{i}')
          if findings:
            print('🚨 Secret scan failed. Potential committed secrets:')
            print('\n'.join(findings[:100]))
            sys.exit(1)
